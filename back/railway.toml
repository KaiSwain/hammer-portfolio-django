# Railway Deployment Configuration
# This file tells Railway how to deploy your Django backend

# Use Python 3.12
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python manage.py collectstatic --noinput && python manage.py migrate && gunicorn hammer_backendproject.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/admin/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
PYTHONPATH = "/app"
DJANGO_SETTINGS_MODULE = "hammer_backendproject.settings"
PORT = "8000"
