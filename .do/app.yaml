# DigitalOcean App Platform Configuration
# This file defines both frontend and backend services

name: hammer-portfolio
region: nyc1

services:
  # Frontend Next.js App (Primary Web Service)
  - name: hammer-frontend
    source_dir: /front
    github:
      repo: KaiSwain/hammer-portfolio-django
      branch: phase1
    build_command: npm run build
    run_command: npm start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    
    envs:
      - key: NODE_ENV
        value: "production"
      - key: NEXT_PUBLIC_API_URL
        value: "https://hammer-backend-vaa4g.ondigitalocean.app"
      - key: NEXT_PUBLIC_SITE_URL
        value: "https://portal.hammermath.com"
    
    # Health check for frontend
    health_check:
      http_path: /

  # Backend Django API (Internal Service)
  - name: hammer-backend
    source_dir: /back
    github:
      repo: KaiSwain/hammer-portfolio-django
      branch: phase1
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8000
    
    envs:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "hammer_backendproject.settings"
      - key: DJANGO_SECRET_KEY
        type: SECRET
        value: "your-secret-key-will-be-generated"
      - key: OPENAI_API_KEY
        type: SECRET
        value: "your-openai-api-key"
      - key: OPENAI_MODEL
        value: "gpt-4o-mini"
      - key: DJANGO_ALLOWED_HOSTS
        value: "${APP_DOMAIN},${hammer-backend.PUBLIC_URL},hammermath-portal-vaa4g.ondigitalocean.app,.ondigitalocean.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://${hammer-frontend.PUBLIC_URL},https://${APP_DOMAIN},https://hammermath-portal-vaa4g.ondigitalocean.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://${hammer-frontend.PUBLIC_URL},https://${APP_DOMAIN},https://hammermath-portal-vaa4g.ondigitalocean.app"
      - key: DATABASE_URL
        value: "${hammer-db.DATABASE_URL}"
      - key: PORT
        value: "8080"
      - key: DB_NAME
        value: "${hammer-db.DATABASE_NAME}"
      - key: DB_USER
        value: "${hammer-db.USERNAME}"
      - key: DB_PASSWORD
        value: "${hammer-db.PASSWORD}"
      - key: DB_HOST
        value: "${hammer-db.HOSTNAME}"
      - key: DB_PORT
        value: "${hammer-db.PORT}"
    
    # Health check endpoint
    health_check:
      http_path: /admin/
    
    # Build and run commands
    build_command: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    
    run_command: ./start.sh

  # Frontend Next.js App
  - name: hammer-frontend
    source_dir: /front
    github:
      repo: KaiSwain/hammer-portfolio-django
      branch: phase1
    build_command: npm run build
    run_command: npm start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    
    envs:
      - key: NODE_ENV
        value: "production"
      - key: NEXT_PUBLIC_API_URL
        value: "https://${hammer-backend.PUBLIC_URL}"
      - key: NEXT_PUBLIC_SITE_URL
        value: "https://${hammer-frontend.PUBLIC_URL}"
    
    # Health check for frontend
    health_check:
      http_path: /

# Database
databases:
  - name: hammer-db
    engine: PG
    version: "15"
    production: true  # Use production database with full permissions
    cluster_name: hammer-portfolio-db

# Domain configuration
domains:
  - domain: portal.hammermath.com
    type: PRIMARY
    wildcard: false
    zone: hammermath.com

# Jobs for database initialization
jobs:
  - name: migrate-database
    source_dir: /back
    github:
      repo: KaiSwain/hammer-portfolio-django
      branch: phase1
    run_command: |
      python manage.py migrate --noinput --verbosity=2
      python -c "
      import os
      import django
      os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'hammer_backendproject.settings')
      django.setup()
      from django.contrib.auth import get_user_model
      User = get_user_model()
      if not User.objects.filter(username='admin').exists():
          User.objects.create_superuser('admin', 'admin@hammermath.com', 'HammerAdmin2025!')
          print('Admin user created')
      else:
          print('Admin user already exists')
      "
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    kind: PRE_DEPLOY
    
    envs:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "hammer_backendproject.settings"
      - key: DJANGO_SECRET_KEY
        type: SECRET
        value: "your-secret-key-will-be-generated"
      - key: DATABASE_URL
        value: "${hammer-db.DATABASE_URL}"
